name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Enforce 80 percent coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          awk -v total="$total" 'BEGIN { if (total < 80) exit 1 }'

      - name: Build
        run: go build ./cmd/grok2api

  python-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q
