name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Measure internal package coverage
        # Keep unit coverage gate on the runtime core packages.
        # Account registration lives in external grok-register; not covered here.
        run: |
          go test -coverprofile=coverage.out \
            ./internal/account \
            ./internal/admin \
            ./internal/api \
            ./internal/application/gateway \
            ./internal/bridge \
            ./internal/compat \
            ./internal/config \
            ./internal/infra/persistence/sqlite \
            ./internal/repository \
            ./internal/runtime \
            ./internal/scheduler \
            ./internal/service \
            ./internal/upstream

      - name: Enforce coverage floor
        # Floor temporarily 75% while Anthropic↔Responses stream state machine lands.
        # Raise back to 80 once stream/edge-path unit tests catch up.
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "coverage total=${total}%"
          awk -v total="$total" 'BEGIN { if (total < 75) exit 1 }'

      - name: Build backend
        run: go build ./cmd/grok2api

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  image-smoke:
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build single-architecture delivery image
        run: docker build --tag grok2api:ci .

      - name: Verify Docker delivery contract
        run: bash scripts/smoke-docker-image.sh grok2api:ci
