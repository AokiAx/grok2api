<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>grok2api Go</title>
  <style>
    body{font:14px system-ui;background:#0b1020;color:#e8edf7;margin:0}main{max-width:1100px;margin:auto;padding:24px}
    h1{font-size:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{background:#141c30;border:1px solid #2a3653;border-radius:12px;padding:16px}
    .value{font-size:30px;font-weight:700}.muted{color:#91a0bd}textarea,input,button{box-sizing:border-box;background:#0e1628;color:#fff;border:1px solid #34415f;border-radius:8px;padding:10px}textarea{width:100%;min-height:150px}button{cursor:pointer;margin-right:8px}pre{white-space:pre-wrap;overflow:auto}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #28344f;text-align:left}
  </style>
</head>
<body><main>
  <h1>grok2api Go</h1><p class="muted">Ready Pool / Unavailable Pool</p>
  <div class="grid"><div class="card"><div class="muted">Ready Pool</div><div class="value" id="ready">-</div></div><div class="card"><div class="muted">Unavailable Pool</div><div class="value" id="unavailable">-</div></div><div class="card"><div class="muted">Quota Circuit</div><div class="value" id="circuit">-</div></div></div>
  <div class="card" style="margin-top:12px"><h2>账号</h2><table><thead><tr><th>账号</th><th>Pool</th><th>原因</th><th>重试时间</th><th>操作</th></tr></thead><tbody id="accounts"></tbody></table></div>
  <div class="card" style="margin-top:12px"><h2>导入授权凭证</h2><input id="key" type="password" placeholder="面板密码" style="width:100%;margin-bottom:8px"><textarea id="input" placeholder='[{"access_token":"...","refresh_token":"...","email":"user@example.com"}]'></textarea><p><button onclick="send(true)">预览</button><button onclick="send(false)">导入</button></p><pre id="output"></pre></div>
  <script>
    const byId=id=>document.getElementById(id);
    const auth=()=>{const v=byId('key').value;return v?{'Authorization':'Bearer '+v}:{} };
    const cell=(row,value)=>{const td=document.createElement('td');td.textContent=value??'';row.appendChild(td);return td};
    async function refresh(){
      const h=await fetch('/health').then(r=>r.json());
      byId('ready').textContent=h.account_pool.ready;
      byId('unavailable').textContent=h.account_pool.unavailable;
      byId('circuit').textContent=h.quota_circuit?.open?'OPEN':'closed';
      const r=await fetch('/admin/api/cli-accounts',{headers:auth()});if(!r.ok)return;
      const d=await r.json();const body=byId('accounts');body.replaceChildren();
      for(const account of d.accounts){
        const row=document.createElement('tr');
        cell(row,account.email||account.id);cell(row,account.pool);cell(row,account.unavailable_reason);cell(row,account.retry_at);
        const actions=cell(row,'');
        const recover=document.createElement('button');recover.textContent='恢复验证';recover.onclick=()=>accountAction(account.id,'recover');actions.appendChild(recover);
        const remove=document.createElement('button');remove.textContent='删除';remove.onclick=()=>accountAction(account.id,'delete');actions.appendChild(remove);
        body.appendChild(row);
      }
    }
    async function accountAction(id,action){
      if(action==='delete'&&!confirm(`确认删除 ${id}？`))return;
      const path=`/admin/api/cli-accounts/${encodeURIComponent(id)}${action==='recover'?'/recover':''}`;
      const r=await fetch(path,{method:action==='recover'?'POST':'DELETE',headers:auth()});
      const data=await r.json();byId('output').textContent=JSON.stringify(data,null,2);await refresh();
    }
    async function send(preview){try{let parsed=JSON.parse(byId('input').value);if(!Array.isArray(parsed))parsed=parsed.accounts||[parsed];const path=preview?'/admin/api/accounts/import/preview':'/admin/api/accounts/import';const r=await fetch(path,{method:'POST',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({accounts:parsed})});byId('output').textContent=JSON.stringify(await r.json(),null,2);await refresh()}catch(error){byId('output').textContent=String(error)}}
    refresh();
  </script>
</main></body></html>
